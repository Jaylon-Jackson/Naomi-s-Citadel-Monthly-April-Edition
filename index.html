<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Naomi Reading</title>
    <style>
        body { background: black; color: white; font-family: Arial, sans-serif; }
        .starfield { position: absolute; width: 100%; height: 100%; background: url(starfield.png); animation: starfield 50s linear infinite; }
        @keyframes starfield { from { background-position: 0 0; } to { background-position: 100% 100%; } }
        #countdown { font-size: 2rem; } /* Additional styles can go here */
    </style>
</head>
<body>
    <div class="starfield"></div>
    <nav>
        <ul>
            <li><a href="#lenormand">Lenormand</a></li>
            <li><a href="#kipper">Kipper</a></li>
            <li><a href="#tarot">Tarot & Oracle</a></li>
            <li><a href="#synthesis">Synthesis</a></li>
        </ul>
    </nav>
    <div id="lenormand"> <!-- Content for Lenormand --> </div>
    <div id="kipper"> <!-- Content for Kipper --> </div>
    <div id="tarot"> <!-- Content for Tarot & Oracle --> </div>
    <div id="synthesis"> <!-- Content for Synthesis --> </div>
    <div id="countdown">Countdown: <span id="timer"></span></div>
    <button id="saveShareBtn">Save/Share</button>
    <script>
        // Countdown Timer
        const countdownDate = new Date('2026-04-06T23:59:59Z').getTime();
        const timerElement = document.getElementById('timer');
        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countdownDate - now;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            timerElement.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
            if (distance < 0) {
                clearInterval(x);
                timerElement.innerHTML = 'EXPIRED';
            }
        }, 1000);

        // Zoom functionality and save/share button behavior can be implemented here.
    </script>
</body>
</html>
